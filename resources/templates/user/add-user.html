<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/admin-layout :: admin-layout(~{::content})}">

<th:block th:fragment="content">
    <div class="container my-5" th:if="${currentRole == 'ROLE_BTC'}">

        <div class="text-center mb-4">
            <h2 class="fw-bold text-uppercase m-0 page-title">THÔNG TIN TÀI KHOẢN NGƯỜI DÙNG</h2>
        </div>

        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="form-card">
                    <form th:action="@{/user/save}" th:object="${user}" method="post">

                        <div class="mb-4">
                            <label class="form-label fw-semibold">Tên tài khoản (Username)</label>
                            <input class="form-control fw-bold" type="text" th:field="*{username}" placeholder="Ví dụ: admin_btc" th:readonly="${user.username != null}" required>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-semibold">Họ và tên</label>
                            <input class="form-control" type="text" th:field="*{hoTen}" placeholder="Ví dụ: Nguyễn Văn A" required>
                        </div>

                        <div class="row mb-4">
                            <div class="col-md-6 mb-3 mb-md-0">
                                <label class="form-label fw-semibold">Email</label>
                                <input class="form-control" type="email" th:field="*{email}" placeholder="example@sportsleague.com">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Số điện thoại</label>
                                <input class="form-control" type="tel" th:field="*{soDienThoai}" placeholder="0912345678">
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-semibold">Mật khẩu</label>
                            <input class="form-control" type="password" th:field="*{passwordHash}" placeholder="Nhập mật khẩu" th:required="${user.username == null}">
                            <small th:if="${user.username != null}" class="text-muted d-block mt-1">
                                <i class="bi bi-info-circle me-1"></i> Để trống nếu không muốn thay đổi mật khẩu.
                            </small>
                        </div>

                        <hr class="my-4">

                        <h5 class="fw-bold mb-3"><i class="bi bi-shield-lock me-2"></i> Phân quyền hệ thống</h5>
                        <div class="card border-0 bg-light mb-4">
                            <div class="card-body">
                                <div class="form-check mb-3">
                                    <input class="form-check-input" type="radio" th:field="*{vaiTro}" value="ROLE_BTC" id="roleBTC">
                                    <label class="form-check-label" for="roleBTC">
                                        <span class="fw-bold">Ban tổ chức (ROLE_BTC)</span>
                                        <div class="small text-muted">Toàn quyền hệ thống, quản lý người dùng, phân công giải đấu.</div>
                                    </label>
                                </div>

                                <div class="form-check mb-3">
                                    <input class="form-check-input" type="radio" th:field="*{vaiTro}" value="ROLE_TD" id="roleTD">
                                    <label class="form-check-label" for="roleTD">
                                        <span class="fw-bold">Trưởng đoàn (ROLE_TD)</span>
                                        <div class="small text-muted">Ch chỉ quản lý dữ liệu đội bóng của mình.</div>
                                    </label>
                                </div>

                                <div class="form-check mb-3">
                                    <input class="form-check-input" type="radio" th:field="*{vaiTro}" value="ROLE_TT" id="roleTT">
                                    <label class="form-check-label" for="roleTT">
                                        <span class="fw-bold">Trọng tài (ROLE_TT)</span>
                                        <div class="small text-muted">Được cập nhật kết quả các trận được phân công.</div>
                                    </label>
                                </div>

                                <div class="form-check">
                                    <input class="form-check-input" type="radio" th:field="*{vaiTro}" value="ROLE_GS" id="roleGS">
                                    <label class="form-check-label" for="roleGS">
                                        <span class="fw-bold">Giám sát (ROLE_GS)</span>
                                        <div class="small text-muted">Theo dõi và giám sát hoạt động giải đấu.</div>
                                    </label>
                                </div>
                            </div>
                        </div>

                        <div id="teamSelectBlock" class="mb-4 border p-3 rounded bg-white shadow-sm style-select-team">
                            <label class="form-label fw-semibold text-primary"><i class="bi bi-flag-fill me-1"></i> Gán Đội bóng quản lý (Chỉ cho Trưởng đoàn)</label>
                            <select class="form-select" th:field="*{maDoi}">
                                <option value="">-- Không chọn / Không thuộc đội nào --</option>
                                <option th:each="t : ${teams}" th:value="${t.maDoi}" th:text="${t.tenDoi}">Tên đội mẫu</option>
                            </select>
                        </div>

                        <h5 class="fw-bold mb-3"><i class="bi bi-person-lock me-2"></i> Trạng thái tài khoản</h5>
                        <div class="card border-0 bg-light mb-4">
                            <div class="card-body">
                                <div class="form-check form-switch">
                                    <input class="form-check-input" type="checkbox" id="activeSwitch" th:checked="${user.trangThai == 'ACTIVE'}">
                                    <label class="form-check-label fw-semibold" for="activeSwitch">Tài khoản hoạt động</label>
                                    <input type="hidden" id="trangThai" name="trangThai" th:value="${user.trangThai}">
                                </div>
                                <small class="text-muted">Tắt công tắc để khóa tài khoản người dùng.</small>
                            </div>
                        </div>

                        <div class="d-flex justify-content-end gap-2">
                            <a th:href="@{/user}" class="btn btn-outline-secondary px-4 py-2 fw-semibold">
                                <i class="bi bi-arrow-left me-2"></i> Quay lại
                            </a>
                            <button type="submit" class="btn btn-dark px-4 py-2 fw-semibold shadow-sm">
                                <i class="bi bi-check-lg me-2"></i> Lưu tài khoản
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div class="container my-5 text-center" th:if="${currentRole != 'ROLE_BTC'}">
        <div class="alert alert-danger py-5 shadow-sm rounded">
            <i class="bi bi-exclamation-triangle-fill text-danger fs-1"></i>
            <h3 class="fw-bold mt-3">TRUY CẬP BỊ TỪ CHỐI (403)</h3>
            <p class="text-muted">Chỉ Ban tổ chức mới có quyền cấu hình danh mục phân quyền người dùng.</p>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            // Logic xử lý nút chuyển trạng thái switch
            const sw = document.getElementById('activeSwitch');
            const status = document.getElementById('trangThai');

            function syncStatus() {
                if(sw && status) {
                    status.value = sw.checked ? 'ACTIVE' : 'LOCKED';
                }
            }
            if(sw) {
                sw.addEventListener('change', syncStatus);
            }

            // Logic tự động ẩn/hiển thị khu vực chọn đội bóng
            const teamBlock = document.getElementById('teamSelectBlock');
            const roleRadios = document.querySelectorAll('input[name="vaiTro"]');

            function toggleTeamSelect() {
                const selectedRole = document.querySelector('input[name="vaiTro"]:checked')?.value;
                if (selectedRole === 'ROLE_TD') {
                    teamBlock.style.display = 'block';
                } else {
                    teamBlock.style.display = 'none';
                    document.getElementById('maDoi').value = ''; // Reset dữ liệu nếu chọn role khác
                }
            }

            roleRadios.forEach(radio => radio.addEventListener('change', toggleTeamSelect));
            toggleTeamSelect(); // Chạy lần đầu kiểm tra khi load trang sửa
        });
    </script>
</th:block>
</html>
