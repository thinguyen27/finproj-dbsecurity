<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/admin-layout :: admin-layout(~{::content})}">

<th:block th:fragment="content">
    <div class="container my-5" th:if="${currentRole == 'ROLE_BTC'}">

        <div class="text-center mb-4">
            <h2 class="fw-bold text-uppercase m-0 page-title">
                THÔNG TIN CƠ BẢN TRẬN ĐẤU
            </h2>
            <p class="text-muted small mt-2 text-uppercase fw-semibold" style="letter-spacing: 1px;">Kế hoạch & Lịch thi đấu</p>
        </div>

        <div class="row justify-content-center">
            <div class="col-lg-10">

                <div class="form-card">
                    <form th:action="@{/match/save}" th:object="${match}" method="post">

                        <input type="hidden" th:field="*{maTranDau}">

                        <div class="row mb-4">
                            <div class="col-md-8 mb-3 mb-md-0">
                                <label class="form-label mb-2 fw-semibold">Giải đấu</label>
                                <select class="form-select" th:field="*{maGiai}" required>
                                    <option value="" disabled selected>-- Chọn giải đấu --</option>
                                    <option th:each="giai : ${tournaments}" 
                                            th:value="${giai.maGiai}" 
                                            th:text="${giai.tenGiai}">Bundesliga</option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label mb-2 fw-semibold">Vòng đấu</label>
                                <input class="form-control text-center" type="number" min="1" max="99" th:field="*{vongDau}" required>
                            </div>
                        </div>

                        <div class="row mb-4">
                            <div class="col-md-6 mb-3 mb-md-0">
                                <label class="form-label mb-2 fw-semibold">Ngày & Giờ thi đấu</label>
                                <input class="form-control" type="datetime-local" th:field="*{ngayGioThiDau}" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label mb-2 fw-semibold">Sân vận động</label>
                                <select class="form-select" th:field="*{maSan}">
                                    <option value="" selected>-- Chọn sân thi đấu --</option>
                                    <option th:each="san : ${stadiums}" 
                                            th:value="${san.maSan}" 
                                            th:text="${san.tenSan}">Veltins Arena</option>
                                </select>
                            </div>
                        </div>

                        <h5 class="fw-bold text-uppercase my-4 section-subtitle text-secondary" style="font-size: 0.9rem; letter-spacing: 0.5px;">Cặp trận thi đấu</h5>

                        <div class="row mb-4 align-items-center">
                            <div class="col-md-5">
                                <label class="form-label mb-2 fw-semibold text-primary">Đội nhà (Đội A)</label>
                                <select class="form-select fw-bold text-dark" th:field="*{maDoiA}" required>
                                    <option value="" disabled selected>-- Chọn đội chủ nhà --</option>
                                    <option th:each="team : ${teams}" th:value="${team.maDoi}" th:text="${team.tenDoi}">Schalke 04</option>
                                </select>
                            </div>
                            <div class="col-md-2 text-center mt-4">
                                <span class="badge bg-dark px-3 py-2">VS</span>
                            </div>
                            <div class="col-md-5">
                                <label class="form-label mb-2 fw-semibold text-danger">Đội khách (Đội B)</label>
                                <select class="form-select fw-bold text-dark" th:field="*{maDoiB}" required>
                                    <option value="" disabled selected>-- Chọn đội khách --</option>
                                    <option th:each="team : ${teams}" th:value="${team.maDoi}" th:text="${team.tenDoi}">Paderborn</option>
                                </select>
                            </div>
                        </div>

                        <input type="hidden" th:field="*{trangThaiTran}" th:value="*{trangThaiTran ?: 'PENDING'}">
                        <input type="hidden" th:field="*{ketQuaStatus}" th:value="*{ketQuaStatus ?: 'PENDING'}">

                        <hr class="my-4">

                        <div class="d-flex justify-content-end gap-2">
                            <a th:href="@{/match}" class="btn btn-outline-secondary px-4 py-2 fw-semibold">
                                <i class="bi bi-arrow-left me-2"></i>Quay lại
                            </a>
                            <button type="submit" class="btn btn-dark px-4 py-2 fw-semibold shadow-sm">
                                <i class="bi bi-calendar-plus me-2"></i>Lưu thông tin lịch đấu
                            </button>
                        </div>

                    </form>
                </div>

            </div>
        </div>
    </div>

    <div class="container my-5 text-center" th:if="${currentRole != 'ROLE_BTC'}">
        <div class="alert alert-danger py-5 shadow-sm rounded">
			<i class="bi bi-exclamation-triangle-fill text-danger fs-1"></i>
			<h3 class="fw-bold mt-3">TRUY CẬP BỊ TỪ CHỐI (403)</h3>
			<p class="text-muted">Chỉ Ban tổ chức mới có quyền thiết lập thông tin lịch thi đấu.</p>
		</div>
    </div>
</th:block>
</html>
