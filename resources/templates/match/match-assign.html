<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	th:replace="~{layout/admin-layout :: admin-layout(~{::content})}">

<th:block th:fragment="content">

	<div class="container my-5" th:if="${currentRole == 'ROLE_BTC'}">

		<div class="text-center mb-4">
			<h2 class="fw-bold text-uppercase m-0 page-title">PHÂN CÔNG NHÂN SỰ TRẬN ĐẤU</h2>
			<p class="text-muted small mt-2 text-uppercase fw-semibold"
				style="letter-spacing: 1px;">Ban trọng tài & Giám sát</p>
		</div>

		<div class="row justify-content-center">
			<div class="col-lg-8">

				<div class="match-row d-flex align-items-center mb-4 bg-white p-3 border rounded shadow-sm">
					<div class="match-status-icon text-muted ps-2">
						<i class="bi bi-info-circle fs-4 text-primary"></i>
					</div>
					<div class="match-main-content d-flex align-items-center justify-content-center flex-grow-1 px-4">
						<div class="team-home text-end fw-bold text-dark fs-5" th:text="${currentMatch.maDoiA}">Đội chủ nhà</div>

						<div class="match-score-box d-flex flex-column align-items-center mx-4 bg-light border-0 py-2 px-3">
							<span class="fw-bold text-dark fs-6">VS</span> 
							<small class="text-muted fw-semibold text-nowrap" style="font-size: 0.65rem;"
								th:text="'Vòng ' + ${currentMatch.vongDau}">Vòng 1</small>
						</div>

						<div class="team-away text-start fw-bold text-dark fs-5" th:text="${currentMatch.maDoiB}">Đội khách</div>
					</div>
					<div class="match-info-badge pe-2 text-end">
						<small class="d-block fw-bold text-secondary" th:text="${currentMatch.ngayGioThiDau}">19:30 24/06/2026</small>
					</div>
				</div>

				<div class="form-card">
					<form th:action="@{/match/assign/save}" method="post">

						<input type="hidden" name="maTranDau" th:value="${currentMatch.maTranDau}">

						<div class="mb-4">
							<label class="form-label mb-2 text-dark"> 
								<i class="bi bi-person-fill text-danger me-1"></i>Trọng tài chính (MAIN_REFEREE)
							</label> 
							<select class="form-select fw-semibold" name="mainReferee" required>
								<option value="" disabled selected>-- Chọn trọng tài chính --</option>
								<option th:each="user : ${referees}" th:value="${user.username}"
									th:text="${user.hoTen} + ' (' + ${user.username} + ')'">Trọng tài mẫu</option>
							</select>
						</div>

						<div class="row mb-4">
							<div class="col-md-6 mb-3 mb-md-0">
								<label class="form-label mb-2 text-dark"> 
									<i class="bi bi-person-fill text-warning me-1"></i>Trọng tài biên 1 (ASSISTANT_1)
								</label> 
								<select class="form-select" name="assistant1" required>
									<option value="" disabled selected>-- Chọn trợ lý 1 --</option>
									<option th:each="user : ${referees}" th:value="${user.username}" th:text="${user.hoTen}"></option>
								</select>
							</div>
							<div class="col-md-6">
								<label class="form-label mb-2 text-dark"> 
									<i class="bi bi-person-fill text-warning me-1"></i>Trọng tài biên 2 (ASSISTANT_2)
								</label> 
								<select class="form-select" name="assistant2" required>
									<option value="" disabled selected>-- Chọn trợ lý 2 --</option>
									<option th:each="user : ${referees}" th:value="${user.username}" th:text="${user.hoTen}"></option>
								</select>
							</div>
						</div>

						<div class="mb-4">
							<label class="form-label mb-2 text-dark"> 
								<i class="bi bi-tv-fill text-info me-1"></i>Trọng tài phòng VAR (VAR)
							</label> 
							<select class="form-select" name="varReferee" required>
								<option value="" disabled selected>-- Chọn trọng tài VAR --</option>
								<option th:each="user : ${referees}" th:value="${user.username}" th:text="${user.hoTen}"></option>
							</select>
						</div>

						<div class="mb-4">
							<label class="form-label mb-2 text-dark"> 
								<i class="bi bi-shield-shaded text-success me-1"></i>Giám sát trận đấu (SUPERVISOR)
							</label> 
							<select class="form-select" name="supervisor" required>
								<option value="" disabled selected>-- Chọn giám sát viên --</option>
								<option th:each="user : ${supervisors}" th:value="${user.username}" th:text="${user.hoTen}"></option>
							</select>
						</div>

						<hr class="my-4">

						<div class="d-flex justify-content-end gap-2">
							<a th:href="@{/match}" class="btn btn-outline-secondary px-4 py-2 fw-semibold"> 
								<i class="bi bi-arrow-left me-2"></i>Quay lại
							</a>
							<button type="submit" class="btn btn-dark px-4 py-2 fw-semibold shadow-sm">
								<i class="bi bi-shield-check me-2"></i>Xác nhận phân công
							</button>
						</div>

					</form>
				</div>

			</div>
		</div>
	</div>

	<div class="container my-5 text-center" th:if="${currentRole != 'ROLE_BTC'}">
		<div class="alert alert-danger py-5 shadow-sm rounded">
			<i class="bi bi-exclamation-triangle-fill text-danger fs-1"></i>
			<h3 class="fw-bold mt-3">TRUY CẬP BỊ TỪ CHỐI (403)</h3>
			<p class="text-muted">Bạn không có quyền thực hiện chức năng phân công nhân sự giải đấu.</p>
			<a href="/match" class="btn btn-dark mt-3 px-4 fw-semibold">
				<i class="bi bi-arrow-left me-2"></i>Quay lại danh sách trận đấu
			</a>
		</div>
	</div>

</th:block>
</html>
