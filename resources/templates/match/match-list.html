<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/admin-layout :: admin-layout(~{::content})}">

<th:block th:fragment="content">
    <div class="container my-5">

        <div class="text-center mb-5">
            <h2 class="fw-bold text-uppercase m-0 page-title">DANH SÁCH TRẬN ĐẤU</h2>
        </div>

        <div class="match-tournament-group mb-5">
            
            <div class="match-day-header d-flex justify-content-between align-items-center mb-3">
                <span class="day-name fw-bold text-uppercase text-primary">
                    <i class="bi bi-trophy-fill me-2"></i>DANH SÁCH LỊCH THI ĐẤU
                </span>
                
                <div class="d-flex align-items-center gap-3">
                    <span class="day-date text-muted fw-semibold" th:text="'Tổng số: ' + ${matches.size()} + ' trận'">Tổng số trận</span>
                    
                    <a th:if="${session.role == 'ROLE_BTC'}" 
                       th:href="@{/match/add}" 
                       class="btn btn-dark btn-sm fw-semibold shadow-sm px-3">
                        <i class="bi bi-plus-lg me-1"></i> Thêm trận
                    </a>
                </div>
            </div>

            <div class="match-list">
                
                <div th:each="m : ${matches}" class="match-row d-flex align-items-center bg-white p-2 mb-2 border rounded shadow-sm"
                     th:classappend="${m.trangThaiTran == 'PLAYING'} ? 'live-match' : ''">
                    
                    <div class="match-status-icon ps-3" 
                         th:classappend="${m.trangThaiTran == 'PLAYING'} ? 'text-danger' : 'text-muted'">
                        <i th:class="${m.trangThaiTran == 'PLAYING'} ? 'bi bi-activity fs-5 animate-pulse' : 
                                    (${m.trangThaiTran == 'FINISHED'} ? 'bi bi-check-circle-fill text-success fs-5' : 'bi bi-calendar3 fs-5')"></i>
                    </div>
                    
                    <div class="match-main-content d-flex align-items-center justify-content-center flex-grow-1 px-4">
                        
                        <div class="team-home text-end fw-bold text-dark" style="width: 35%;" th:text="${m.maDoiA}">Đội A</div>
                        
                        <div class="match-score-box d-flex flex-column align-items-center mx-4" style="width: 20%;">
                            
                            <div th:if="${m.trangThaiTran == 'FINISHED' || m.trangThaiTran == 'PLAYING'}" class="d-flex align-items-center">
                                <span class="score-num fw-bold fs-4" th:classappend="${m.trangThaiTran == 'PLAYING'} ? 'text-danger' : ''" th:text="${m.tySoDoiA}">0</span>
                                <span class="score-divider mx-2 fw-bold fs-4" th:classappend="${m.trangThaiTran == 'PLAYING'} ? 'text-danger' : ''">:</span>
                                <span class="score-num fw-bold fs-4" th:classappend="${m.trangThaiTran == 'PLAYING'} ? 'text-danger' : ''" th:text="${m.tySoDoiB}">0</span>
                            </div>
                            
                            <div th:if="${m.trangThaiTran == 'PENDING'}" class="fw-bold text-secondary fs-6">
                                <span th:text="${#strings.substring(m.ngayGioThiDau, 11, 16)}">19:30</span>
                            </div>
                            
                            <small class="text-muted text-nowrap" style="font-size: 0.65rem;" 
                                   th:text="${m.trangThaiTran == 'PENDING'} ? ${#strings.substring(m.ngayGioThiDau, 0, 10)} : 'Vòng ' + ${m.vongDau}">Vòng đấu</small>
                        </div>
                        
                        <div class="team-away text-start fw-bold text-dark" style="width: 35%;" th:text="${m.maDoiB}">Đội B</div>
                    </div>
                    
                    <div class="match-info-badge pe-3">
                        <span th:if="${m.trangThaiTran == 'FINISHED'}" class="badge bg-secondary-subtle text-secondary border border-secondary-subtle py-1 px-2">FT</span>
                        <span th:if="${m.trangThaiTran == 'PLAYING'}" class="badge bg-danger-subtle text-danger border border-danger-subtle py-1 px-2">LIVE</span>
                        <span th:if="${m.trangThaiTran == 'PENDING'}" class="badge bg-light text-dark border py-1 px-2" th:text="'Vòng ' + ${m.vongDau}">Vòng 1</span>
                    </div>

                    <div th:if="${session.role == 'ROLE_BTC' || session.role == 'ROLE_TT'}" class="match-actions pe-2 border-start ps-3 flex-shrink-0">
                        <div class="btn-group gap-1">
                            
                            <a class="btn btn-outline-success btn-sm rounded text-nowrap" 
                               th:href="@{/match/result/edit/{id}(id=${m.maTranDau})}"
                               title="Cập nhật tỷ số & thẻ phạt">
                                <i class="bi bi-scoreboard me-1"></i> Tỷ số
                            </a>

                            <a th:if="${session.role == 'ROLE_BTC'}"
                               class="btn btn-outline-primary btn-sm rounded text-nowrap" 
                               th:href="@{/match/assign(maTranDau=${m.maTranDau})}"
                               title="Phân công trọng tài & giám sát">
                                <i class="bi bi-shield-lock-fill me-1"></i> Phân công
                            </a>
                            
                            <a th:if="${session.role == 'ROLE_BTC'}"
                               class="btn btn-outline-warning btn-sm rounded text-nowrap" 
                               th:href="@{/match/edit/{id}(id=${m.maTranDau})}"
                               title="Sửa lịch thi đấu">
                                Sửa
                            </a>
                            
                            <a th:if="${session.role == 'ROLE_BTC'}"
                               class="btn btn-outline-danger btn-sm rounded text-nowrap" 
                               th:href="@{/match/delete/{id}(id=${m.maTranDau})}"
                               onclick="return confirm('Bạn có chắc chắn muốn xóa trận đấu này?')"
                               title="Xóa trận">
                                Xóa
                            </a>
                        </div>
                    </div>
                    
                </div>
                
            </div>
        </div>

    </div>
</th:block>
</html>
