<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/admin-layout :: admin-layout(~{::content})}">

<th:block th:fragment="content">
    <div class="container my-5" th:if="${currentRole == 'ROLE_BTC'}">

        <div class="text-center mb-4">
            <h2 class="fw-bold text-uppercase m-0 page-title">
                THÔNG TIN ĐỘI THI ĐẤU
            </h2>
        </div>

        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="form-card">
                    <form th:action="@{/team/save}" th:object="${team}" method="post">
                        <input type="hidden" th:field="*{maDoi}">
                        
                        <div class="mb-4" th:if="${tournaments != null}">
                            <label class="form-label mb-2 fw-semibold">Giải đấu trực thuộc <span class="text-danger">*</span></label>
                            <select class="form-select" th:field="*{giaiDau.maGiai}" required>
                                <option value="">-- Chọn giải đấu --</option>
                                <option th:each="gd : ${tournaments}"
                                        th:value="${gd.maGiai}"
                                        th:text="${gd.tenGiai}">
                                </option>
                            </select>
                        </div>

                        <div class="mb-4" th:if="${tournaments == null}">
                            <label class="form-label mb-2 fw-semibold">Giải đấu trực thuộc</label>
                            <input class="form-control bg-light" type="text" th:value="${team.giaiDau?.tenGiai}" readonly>
                            <input type="hidden" th:field="*{giaiDau.maGiai}">
                        </div>

                        <div class="mb-4">
                            <label class="form-label mb-2 fw-semibold">Tên đội thi đấu <span class="text-danger">*</span></label>
                            <input class="form-control" type="text" th:field="*{tenDoi}" placeholder="Ví dụ: Schalke 04, Bayern Munich" required>
                        </div>

                        <div class="mb-4">
                            <label class="form-label mb-2 fw-semibold">Sân vận động (Sân nhà)</label>
                            <input class="form-control" type="text" th:field="*{sanNha}" placeholder="Ví dụ: Veltins Arena, Allianz Arena">
                        </div>

                        <div class="row mb-4">
                            <div class="col-md-6 mb-3 mb-md-0">
                                <label class="form-label mb-2 fw-semibold">Tài khoản Trưởng đoàn</label>
                                <select class="form-select" th:field="*{truongDoan_Username}">
                                    <option value="">-- Chọn trưởng đoàn --</option>
                                    <option th:each="user : ${users}"
                                            th:value="${user.username}"
                                            th:text="${user.username}">
                                    </option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label mb-2 fw-semibold">Ngày thành lập đội</label>
                                <input class="form-control" type="date" th:field="*{ngayThanhLap}">
                            </div>
                        </div>

                        <hr class="my-4">

                        <div class="d-flex justify-content-end gap-2">
                            <a href="javascript:history.back()" class="btn btn-outline-secondary px-4 py-2 fw-semibold">
                                <i class="bi bi-arrow-left me-2"></i>Quay lại
                            </a>
                            <button type="submit" class="btn btn-dark px-4 py-2 fw-semibold shadow-sm">
                                <i class="bi bi-check-lg me-2"></i>Lưu
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div class="container my-5 text-center" th:if="${currentRole != 'ROLE_BTC'}">
        <div class="alert alert-danger py-5 shadow-sm rounded">
            <i class="bi bi-exclamation-triangle-fill text-danger fs-1"></i>
            <h3 class="fw-bold mt-3">TRUY CẬP BỊ TỪ CHỐI (403)</h3>
            <p class="text-muted">Chỉ có Ban tổ chức mới có quyền can thiệp vào thông tin hành chính của đội bóng.</p>
            <a th:href="@{/team/list}" class="btn btn-dark mt-3 px-4 fw-semibold">Quay lại danh sách</a>
        </div>
    </div>
</th:block>
</html>
