<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/admin-layout :: admin-layout(~{::content})}">

<th:block th:fragment="content">
    <div class="container my-5">

        <div class="text-center mb-4">
            <h2 class="fw-bold text-uppercase m-0 page-title text-success">
                <i class="bi bi-whistle-fill me-2"></i>LỊCH PHÂN CÔNG TRỌNG TÀI
            </h2>
            <p class="text-muted small mt-2 text-uppercase fw-semibold" style="letter-spacing: 1px;">
                Tài khoản: <span class="text-dark fw-bold" th:text="${session.username}">referee_01</span>
            </p>
        </div>

        <div th:if="${myMatches == null || myMatches.size() == 0}" class="alert alert-info text-center py-4 shadow-sm rounded">
            <i class="bi bi-calendar-x fs-2"></i>
            <p class="mb-0 mt-2 fw-semibold">Hiện tại bạn không có trận đấu nào được phân công nhiệm vụ.</p>
        </div>

        <div th:if="${myMatches != null && myMatches.size() > 0}" class="match-list">
            
            <div th:each="m : ${myMatches}" class="match-row d-flex align-items-center bg-white p-3 mb-3 border rounded shadow-sm"
                 th:classappend="${m.trangThaiTran == 'PLAYING'} ? 'border-danger bg-danger-subtle' : ''">
                
                <div class="match-status-icon ps-2 me-3">
                    <i th:class="${m.trangThaiTran == 'PLAYING'} ? 'bi bi-activity text-danger fs-4 animate-pulse' : 
                                (${m.trangThaiTran == 'FINISHED'} ? 'bi bi-check-circle-fill text-success fs-4' : 'bi bi-clock-history text-muted fs-4')"></i>
                </div>
                
                <div class="match-main-content d-flex align-items-center justify-content-center flex-grow-1 px-4">
                    <div class="team-home text-end fw-bold text-dark fs-5" style="width: 35%;" th:text="${m.tenDoiA}">Đội nhà</div>
                    
                    <div class="match-score-box d-flex flex-column align-items-center mx-4" style="width: 25%;">
                        <div th:if="${m.trangThaiTran == 'FINISHED' || m.trangThaiTran == 'PLAYING'}" class="d-flex align-items-center bg-dark text-white px-3 py-1 rounded fw-bold fs-4">
                            <span th:text="${m.tySoDoiA}">0</span>
                            <span class="mx-2">:</span>
                            <span th:text="${m.tySoDoiB}">0</span>
                        </div>
                        
                        <div th:if="${m.trangThaiTran == 'PENDING'}" class="fw-bold text-primary fs-5 bg-primary-subtle px-3 py-1 rounded">
                            <span th:text="${#strings.substring(m.ngayGioThiDau, 11, 16)}">19:30</span>
                        </div>
                        
                        <small class="text-muted mt-1 fw-semibold" style="font-size: 0.75rem;"
                               th:text="${m.trangThaiTran == 'PENDING'} ? ${#strings.substring(m.ngayGioThiDau, 0, 10)} : 'Vòng ' + ${m.vongDau}">Ngày thi đấu</small>
                    </div>
                    
                    <div class="team-away text-start fw-bold text-dark fs-5" style="width: 35%;" th:text="${m.tenDoiB}">Đội khách</div>
                </div>

                <div class="match-actions pe-2 border-start ps-4">
                    <a class="btn btn-success fw-semibold shadow-sm d-flex align-items-center gap-2 text-nowrap" 
                       th:href="@{/match/result/edit/{id}(id=${m.maTranDau})}">
                        <i class="bi bi-file-earmark-spreadsheet-fill"></i> Biên bản trận đấu
                    </a>
                </div>
                
            </div>
        </div>

    </div>
</th:block>
</html>
