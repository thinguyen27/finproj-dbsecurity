<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/admin-layout :: admin-layout(~{::content})}">

<th:block th:fragment="content">
    <div class="container my-5">

        <div class="text-center mb-5">
            <h2 class="fw-bold text-uppercase m-0 page-title">DANH SÁCH TRẬN ĐẤU</h2>
        </div>

        <div class="match-tournament-group mb-5">
            
            <div class="match-day-header d-flex justify-content-between align-items-center mb-3">
                <span class="day-name fw-bold text-uppercase text-primary">
                    <i class="bi bi-trophy-fill me-2"></i>DANH SÁCH LỊCH THI ĐẤU
                </span>
                
                <div class="d-flex align-items-center gap-3">
                    <span class="day-date text-muted fw-semibold" th:text="'Tổng số: ' + ${matches.size()} + ' trận'">Tổng số trận</span>
                    
                    <a th:if="${role == 'ROLE_BTC'}" 
                       th:href="@{/match/add}" 
                       class="btn btn-dark btn-sm fw-semibold shadow-sm px-3">
                        <i class="bi bi-plus-lg me-1"></i> Thêm trận
                    </a>
                </div>
            </div>

            <div class="table-responsive bg-white rounded shadow-sm p-3 border">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                        <tr>
                            <th>Mã Trận</th>
                            <th>Thời gian</th>
                            <th class="text-center">Trận đấu</th>
                            <th>Sân vận động</th>
                            <th>Trạng thái</th>
                            <th th:if="${role == 'ROLE_BTC' || role == 'ROLE_TT'}" class="text-center">Hành động</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="match : ${matches}">
                            <td class="fw-semibold text-primary" th:text="${match.maTranDau}"></td>
                            
                            <td th:text="${#temporals.format(match.ngayGioThiDau, 'dd/MM/yyyy HH:mm')}"></td>
                            
                            <td class="text-center">
                                <span class="fw-bold" th:text="${match.tenDoiA}"></span>
                                <span class="mx-2 badge bg-dark fs-6" 
                                      th:text="${match.tySoDoiA != null ? match.tySoDoiA + ' - ' + match.tySoDoiB : 'VS'}">
                                </span>
                                <span class="fw-bold" th:text="${match.tenDoiB}"></span>
                            </td>
                            
                            <td th:text="${match.tenSan}"></td>
                            
                            <td>
                                <span class="badge bg-secondary" th:if="${match.trangThaiTran == 'CHUA_DIEN_RA'}">Chưa diễn ra</span>
                                <span class="badge bg-success" th:if="${match.trangThaiTran == 'DA_KET_THUC'}">Đã kết thúc</span>
                                <span class="badge bg-danger" th:if="${match.trangThaiTran == 'DANG_DIEN_RA'}">Đang đá</span>
                            </td>

                            <td th:if="${role == 'ROLE_BTC' || role == 'ROLE_TT'}" class="text-center">
                                <div class="btn-group gap-1">
                                    
                                    <a class="btn btn-outline-success btn-sm rounded text-nowrap" 
                                       th:href="@{/match/result/edit/{id}(id=${match.maTranDau})}"
                                       title="Cập nhật tỷ số & thẻ phạt">
                                        <i class="bi bi-scoreboard me-1"></i> Tỷ số
                                    </a>

                                    <a th:if="${role == 'ROLE_BTC'}"
                                       class="btn btn-outline-primary btn-sm rounded text-nowrap" 
                                       th:href="@{/match/assign(maTranDau=${match.maTranDau})}"
                                       title="Phân công">
                                        <i class="bi bi-shield-lock-fill"></i>
                                    </a>
                                    
                                    <a th:if="${role == 'ROLE_BTC'}"
                                       class="btn btn-outline-warning btn-sm rounded text-nowrap" 
                                       th:href="@{/match/edit/{id}(id=${match.maTranDau})}"
                                       title="Sửa trận">
                                        <i class="bi bi-pencil-square"></i>
                                    </a>
                                    
                                    <a th:if="${role == 'ROLE_BTC'}"
                                       class="btn btn-outline-danger btn-sm rounded text-nowrap" 
                                       th:href="@{/match/delete/{id}(id=${match.maTranDau})}"
                                       onclick="return confirm('Bạn có chắc chắn muốn xóa trận đấu này?')"
                                       title="Xóa trận">
                                        <i class="bi bi-trash"></i>
                                    </a>
                                </div>
                            </td>
                            
                        </tr>
                    </tbody>
                </table>
            </div>

        </div>

    </div>
</th:block>
</html>
