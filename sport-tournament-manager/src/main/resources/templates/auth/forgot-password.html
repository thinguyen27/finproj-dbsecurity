<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/admin-layout :: admin-layout(~{::content})}">

<th:block th:fragment="content">
    <div style="background:#f3f3f3; padding:50px 0; min-height:80vh;" class="d-flex align-items-center">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-5">

                    <div class="text-center mb-4">
                        <h2 class="fw-bold text-uppercase m-0 page-title">
                            KHÔI PHỤC MẬT KHẨU
                        </h2>
                        <p class="text-secondary small mt-2">
                            Nhập email liên kết với tài khoản giải đấu để nhận mật khẩu mới.
                        </p>
                    </div>

                    <div class="card shadow border-0 form-card bg-white">
                        <div class="card-body p-5">

                            <div th:if="${success}" class="alert alert-success small py-2 fw-bold text-center shadow-sm">
                                <i class="bi bi-check-circle-fill me-2 fs-5"></i><span th:text="${success}"></span>
                            </div>
                            
                            <div th:if="${error}" class="alert alert-danger small py-2 fw-bold text-center shadow-sm">
                                <i class="bi bi-exclamation-triangle-fill me-2 fs-5"></i><span th:text="${error}"></span>
                            </div>

                            <form method="post" th:action="@{/forgot-password}">
                                
                                <div class="mb-4">
                                    <label class="form-label mb-2 fw-semibold">Địa chỉ Email đã đăng ký</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-light text-muted border-end-0"><i class="bi bi-envelope-fill"></i></span>
                                        <input class="form-control form-control-lg border-start-0" 
                                               type="email" 
                                               name="email" 
                                               placeholder="example@sportsleague.com" 
                                               required>
                                    </div>
                                </div>

                                <button type="submit" class="btn btn-dark w-100 py-2.5 fw-semibold mb-3 shadow-sm" onclick="this.innerHTML='<span class=\'spinner-border spinner-border-sm me-2\'></span>ĐANG GỬI...';">
                                    <i class="bi bi-send-fill me-2"></i>GỬI MẬT KHẨU MỚI
                                </button>

                            </form>

                            <hr class="my-4">

                            <div class="text-center">
                                <a th:href="@{/login}" class="text-secondary text-decoration-none small fw-semibold">
                                    <i class="bi bi-arrow-left me-1"></i> Quay lại trang đăng nhập
                                </a>
                            </div>

                        </div>
                    </div>

                </div>
            </div>
        </div>
    </div>
</th:block>
</html>
