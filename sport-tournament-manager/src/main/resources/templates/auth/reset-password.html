<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/admin-layout :: admin-layout(~{::content})}">

<th:block th:fragment="content">
    <div style="background:#f3f3f3; padding:50px 0; min-height:80vh;" class="d-flex align-items-center">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-5">

                    <div class="text-center mb-4">
                        <h2 class="fw-bold text-uppercase m-0 page-title text-primary">TẠO MẬT KHẨU MỚI</h2>
                        <p class="text-secondary small mt-2">Vui lòng nhập mật khẩu tạm thời được gửi trong Email của bạn.</p>
                    </div>

                    <div class="card shadow border-0 form-card bg-white">
                        <div class="card-body p-5">
                            
                            <div th:if="${success}" class="alert alert-success small py-2 text-center fw-bold">
                                <i class="bi bi-envelope-check-fill me-2"></i><span th:text="${success}"></span>
                            </div>
                            <div th:if="${error}" class="alert alert-danger small py-2 text-center">
                                <i class="bi bi-exclamation-triangle-fill me-2"></i><span th:text="${error}"></span>
                            </div>

                            <form method="post" th:action="@{/reset-password}">
                                <input class="form-control form-control-lg mb-3 bg-light" type="text" name="username" placeholder="Tên đăng nhập của bạn" required>
                                
                                <input class="form-control form-control-lg mb-3 border-primary" type="password" name="tempPassword" placeholder="Mã xác nhận (Mật khẩu từ Email)" required>
                                
                                <input class="form-control form-control-lg mb-4" type="password" name="newPassword" placeholder="Mật khẩu TỰ CHỌN MỚI" required minlength="6">

                                <button type="submit" class="btn btn-primary w-100 py-2.5 fw-semibold shadow-sm">
                                    XÁC NHẬN ĐỔI MẬT KHẨU
                                </button>
                            </form>

                        </div>
                    </div>

                </div>
            </div>
        </div>
    </div>
</th:block>
</html>
