<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/admin-layout :: admin-layout(~{::content})}">
<th:block th:fragment="content">
    
    <div class="container my-5">
        <div class="row justify-content-center">
            <div class="col-lg-6 col-md-8">
                
                <div class="card shadow-sm border-0">
                    <div class="card-header bg-white text-center py-4 border-bottom-0">
                        <h2 class="fw-bold text-uppercase m-0 page-title">
                            <i class="bi bi-key-fill text-warning me-2"></i>Đổi Mật Khẩu
                        </h2>
                        <p class="text-muted small mt-2 fw-semibold">Bảo mật tài khoản của bạn bằng mật khẩu mạnh</p>
                    </div>
                    
                    <div class="card-body p-4 p-md-5 bg-light rounded-bottom">
                        
                        <div th:if="${success}" class="alert alert-success d-flex align-items-center mb-4 shadow-sm" role="alert">
                            <i class="bi bi-check-circle-fill me-2 fs-3"></i>
                            <div>
                                <span class="fw-bold" th:text="${success}"></span><br>
                                <span class="small fw-semibold">Đang tự động đăng xuất, vui lòng đợi...</span>
                            </div>
                        </div>
                        
                        <div th:if="${error}" class="alert alert-danger d-flex align-items-center mb-4 shadow-sm" role="alert">
                            <i class="bi bi-exclamation-triangle-fill me-2 fs-4"></i>
                            <div th:text="${error}"></div>
                        </div>

                        <form th:action="@{/change-password}" method="post" id="changePasswordForm">
                            
                            <div class="mb-4">
                                <label class="form-label fw-semibold">Mật khẩu hiện tại <span class="text-danger">*</span></label>
                                <input type="password" class="form-control form-control-lg" name="oldPassword" placeholder="Nhập mật khẩu cũ" required>
                            </div>
                            
                            <div class="mb-4">
                                <label class="form-label fw-semibold">Mật khẩu mới <span class="text-danger">*</span></label>
                                <input type="password" class="form-control form-control-lg" id="newPassword" name="newPassword" placeholder="Tối thiểu 6 ký tự" minlength="6" required>
                            </div>
                            
                            <div class="mb-5">
                                <label class="form-label fw-semibold">Xác nhận mật khẩu mới <span class="text-danger">*</span></label>
                                <input type="password" class="form-control form-control-lg" id="confirmPassword" placeholder="Nhập lại mật khẩu mới" minlength="6" required>
                                <div class="invalid-feedback fw-semibold">Mật khẩu xác nhận không trùng khớp!</div>
                            </div>
                            
                            <div class="d-grid gap-2">
                                <button type="submit" class="btn btn-dark btn-lg fw-bold shadow-sm" th:disabled="${success != null}">
                                    <i class="bi bi-shield-check me-2"></i>CẬP NHẬT MẬT KHẨU
                                </button>
                                <a href="/" class="btn btn-outline-secondary btn-lg fw-semibold mt-2" th:classappend="${success != null ? 'disabled' : ''}">
                                    <i class="bi bi-arrow-left me-2"></i>Hủy và quay lại
                                </a>
                            </div>
                            
                        </form>
                        
                    </div>
                </div>
                
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const form = document.getElementById('changePasswordForm');
            const newPassword = document.getElementById('newPassword');
            const confirmPassword = document.getElementById('confirmPassword');

            form.addEventListener('submit', function (event) {
                if (newPassword.value !== confirmPassword.value) {
                    event.preventDefault(); // Ngăn form submit
                    confirmPassword.classList.add('is-invalid');
                } else {
                    confirmPassword.classList.remove('is-invalid');
                }
            });

            // Tự động tắt báo lỗi khi người dùng sửa lại cho đúng
            confirmPassword.addEventListener('input', function() {
                if (newPassword.value === confirmPassword.value) {
                    confirmPassword.classList.remove('is-invalid');
                }
            });
        });
    </script>
    
    <script th:if="${success}">
        // Chờ 2 giây (2000ms) để người dùng kịp đọc thông báo màu xanh rồi mới thực hiện đăng xuất
        setTimeout(function() {
            // 1. Xóa token lưu ở trình duyệt
            localStorage.removeItem("jwt_token");
            
            // 2. Chuyển hướng về cổng Logout của Backend (để tiêu diệt Session và Cookie)
            window.location.href = "/api/auth/logout";
        }, 2000); 
    </script>
    
</th:block>
</html>
