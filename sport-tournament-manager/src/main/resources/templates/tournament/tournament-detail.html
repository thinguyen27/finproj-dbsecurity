<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/admin-layout :: admin-layout(~{::content})}">

<th:block th:fragment="content">
    <div class="container my-5">

        <div class="text-center mb-4">
            <h2 class="fw-bold text-uppercase m-0 page-title">
                CÁC ĐỘI THAM GIA GIẢI ĐẤU
            </h2>
            <p class="text-muted small mt-1 text-uppercase fw-semibold" 
               th:text="'Giải đấu: ' + ${currentTournament.tenGiai}" 
               style="letter-spacing: 0.5px;">Tên giải đấu</p>
        </div>

        <div class="table-responsive">
            <table class="table table-bundesliga align-middle">
                <thead>
                <tr>
                    <th style="width:12%;">Mã đội</th>
                    <th style="width:28%;">Tên đội</th>
                    <th style="width:20%;">Trưởng đoàn</th>
                    <th style="width:25%;">Sân nhà</th>
                    <th style="width:15%;" class="text-center">Ngày thành lập</th>
                </tr>
                </thead>

                <tbody>
                <tr th:each="team : ${teamList}">
                    <td class="text-muted" th:text="${team.maDoi}">D001</td>
                    <td>
                        <span class="fw-bold text-dark" th:text="${team.tenDoi}">Bayern Munich</span>
                    </td>
                    <td class="text-secondary" th:text="${team.truongDoan_Username}">manager_01</td>
                    <td class="text-secondary" th:text="${team.sanNha}">Allianz Arena</td>
                    <td class="text-center text-secondary" th:text="${team.ngayThanhLap}">1900-02-27</td>
                </tr>
                
                <tr th:if="${teamList == null || teamList.isEmpty()}">
                    <td colspan="5" class="text-center py-4 text-muted fw-semibold">
                        Chưa có đội bóng nào đăng ký tham gia giải đấu này.
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <div class="d-flex justify-content-end gap-2 mt-4">
            <a href="/tournament" class="btn btn-outline-secondary px-4 py-2 fw-semibold">
                <i class="bi bi-arrow-left me-2"></i>Quay lại danh sách giải đấu
            </a>

            <a th:if="${currentRole == 'ROLE_BTC'}"
               th:href="@{/team/add(maGiai=${currentTournament.maGiai})}"
               class="btn btn-dark px-4 py-2 fw-semibold shadow-sm">
                <i class="bi bi-plus-lg me-2"></i>Thêm đội thi đấu
            </a>
        </div>

    </div>
</th:block>
</html>
