<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/admin-layout :: admin-layout(~{::content})}">

<th:block th:fragment="content">
    <div class="container my-5" th:if="${currentRole == 'ROLE_BTC'}">

        <div class="text-center mb-4">
            <h2 class="fw-bold text-uppercase m-0 page-title">THÔNG TIN GIẢI ĐẤU</h2>
        </div>

        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="form-card">
                    <form th:action="@{/tournament/save}" th:object="${tournament}" method="post">
                        <input type="hidden" th:field="*{maGiai}">

                        <div class="mb-4">
                            <label class="form-label mb-2 fw-semibold">Tên giải đấu</label>
                            <input class="form-control" type="text" th:field="*{tenGiai}" placeholder="Ví dụ: V-League, Bundesliga" required>
                        </div>

                        <div class="mb-4">
                            <label class="form-label mb-2 fw-semibold">Năm tổ chức</label>
                            <input class="form-control" type="number" min="2000" max="2100" th:field="*{namToChuc}" required>
                        </div>

                        <div class="row mb-4">
                            <div class="col-md-6 mb-3 mb-md-0">
                                <label class="form-label mb-2 fw-semibold">Ngày bắt đầu</label>
                                <input class="form-control" type="date" th:field="*{ngayBatDau}" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label mb-2 fw-semibold">Ngày kết thúc</label>
                                <input class="form-control" type="date" th:field="*{ngayKetThuc}">
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label mb-2 fw-semibold">Trạng thái giải</label>
                            <select class="form-select fw-semibold" th:field="*{trangThai}">
                                <option value="REGISTRATION">Đang đăng ký</option>
                                <option value="PLAYING">Đang thi đấu</option>
                                <option value="FINISHED">Đã kết thúc</option>
                            </select>
                        </div>

                        <hr class="my-4">

                        <div class="d-flex justify-content-end gap-2">
                            <a th:href="@{/tournament}" class="btn btn-outline-secondary px-4 py-2 fw-semibold">
                                <i class="bi bi-arrow-left me-2"></i> Quay lại
                            </a>
                            <button type="submit" class="btn btn-dark px-4 py-2 fw-semibold shadow-sm">
                                <i class="bi bi-check-lg me-2"></i> Lưu giải đấu
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div class="container my-5 text-center" th:if="${currentRole != 'ROLE_BTC'}">
        <div class="alert alert-danger py-5 shadow-sm rounded">
            <i class="bi bi-exclamation-triangle-fill text-danger fs-1"></i>
            <h3 class="fw-bold mt-3">TRUY CẬP BỊ TỪ CHỐI (403)</h3>
            <p class="text-muted">Bạn không có quyền chỉnh sửa hoặc tạo mới cấu trúc giải đấu này.</p>
            <a href="/tournament" class="btn btn-dark mt-3 px-4 fw-semibold">Quay lại</a>
        </div>
    </div>
</th:block>
</html>
