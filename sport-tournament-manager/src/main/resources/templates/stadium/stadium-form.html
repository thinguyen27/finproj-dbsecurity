<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/admin-layout :: admin-layout(~{::content})}">

<th:block th:fragment="content">

    <div class="container my-5" th:if="${currentRole == 'ROLE_BTC'}">

        <div class="text-center mb-4">
            <h2 class="fw-bold text-uppercase m-0 page-title">
                THÔNG TIN SÂN VẬN ĐỘNG
            </h2>
        </div>

        <div class="row justify-content-center">
            <div class="col-lg-8">

                <div class="form-card">
                    <form th:action="@{/stadium/save}"
                          th:object="${stadium}"
                          method="post">

                        <input type="hidden" th:field="*{maSan}">

                        <div class="mb-4">
                            <label class="form-label mb-2 fw-semibold">Tên sân vận động</label>
                            <input class="form-control"
                                   type="text"
                                   th:field="*{tenSan}"
                                   placeholder="Ví dụ: Veltins Arena, Allianz Arena, Mỹ Đình"
                                   required>
                        </div>

                        <div class="row mb-4">
                            <div class="col-md-8 mb-3 mb-md-0">
                                <label class="form-label mb-2 fw-semibold">Địa chỉ sân</label>
                                <input class="form-control" 
                                       type="text" 
                                       th:field="*{diaChi}" 
                                       placeholder="Nhập thành phố hoặc địa chỉ chi tiết">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label mb-2 fw-semibold">Sức chứa (Chỗ ngồi)</label>
                                <input class="form-control text-center" 
                                       type="number" 
                                       min="0" 
                                       th:field="*{sucChua}" 
                                       placeholder="Ví dụ: 60000">
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label mb-2 fw-semibold">Mô tả chi tiết / Ghi chú</label>
                            <textarea class="form-control" 
                                      th:field="*{moTa}" 
                                      rows="4" 
                                      placeholder="Nhập các thông tin bổ sung về mặt cỏ, lịch sử hoặc tiện ích..."></textarea>
                        </div>

                        <hr class="my-4">

                        <div class="d-flex justify-content-end gap-2">
                            <a th:href="@{/stadium}"
                               class="btn btn-outline-secondary px-4 py-2 fw-semibold">
                                <i class="bi bi-arrow-left me-2"></i>
                                Quay lại
                            </a>
                            <button type="submit"
                                    class="btn btn-dark px-4 py-2 fw-semibold shadow-sm">
                                <i class="bi bi-check-lg me-2"></i>
                                Lưu thông tin
                            </button>
                        </div>

                    </form>
                </div>

            </div>
        </div>

    </div>

    <div class="container my-5 text-center" th:if="${currentRole != 'ROLE_BTC'}">
        <div class="alert alert-danger py-5 shadow-sm rounded">
            <i class="bi bi-shield-slash-fill text-danger fs-1"></i>
            <h3 class="fw-bold mt-3">TRUY CẬP BỊ TỪ CHỐI (403)</h3>
            <p class="text-muted">Tài khoản của bạn không có đặc quyền quản trị để chỉnh sửa hạ tầng cơ sở sân đấu.</p>
            <a href="/stadium" class="btn btn-dark mt-3 px-4 fw-semibold">Quay lại danh sách</a>
        </div>
    </div>

</th:block>
</html>
