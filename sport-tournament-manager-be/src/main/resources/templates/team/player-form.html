<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/admin-layout :: admin-layout(~{::content})}">

<th:block th:fragment="content">
    <div class="container my-5" th:if="${currentRole == 'ROLE_BTC' || (currentRole == 'ROLE_TD' && session.maDoi == member.maDoi)}">

        <div class="text-center mb-4">
            <h2 class="fw-bold text-uppercase m-0 page-title">HỒ SƠ THÀNH VIÊN ĐỘI BÓNG</h2>
        </div>

        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="form-card">
                    <form th:action="@{/team/member/save}" th:object="${member}" method="post">
                        <input type="hidden" th:field="*{maThanhVien}">
                        <input type="hidden" th:field="*{maDoi}">

                        <div class="mb-4">
                            <label class="form-label mb-2 fw-semibold">Họ và tên thành viên</label>
                            <input class="form-control" type="text" th:field="*{tenThanhVien}" placeholder="Ví dụ: Nguyễn Văn A" required>
                        </div>

                        <div class="mb-4">
                            <label class="form-label mb-2 fw-semibold">Vai trò trong đội</label>
                            <select class="form-select" th:field="*{loaiThanhVien}" required>
                                <option value="CAU_THU">Cầu thủ</option>
                                <option value="HLV_TRUONG">HLV Trưởng</option>
                                <option value="HLV_PHO">HLV Phó</option>
                                <option value="BAC_SI">Bác sĩ</option>
                            </select>
                        </div>

                        <div class="mb-4">
                            <label class="form-label mb-2">Số áo thi đấu</label>
                            <input class="form-control" type="number" min="1" max="99" th:field="*{soAo}" placeholder="Nhập số áo (để trống nếu không phải cầu thủ)">
                        </div>

                        <div class="row mb-4">
                            <div class="col-md-6 mb-3 mb-md-0">
                                <label class="form-label mb-2">Ngày sinh</label>
                                <input class="form-control" type="date" th:field="*{ngaySinh}">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label mb-2">Giới tính</label>
                                <select class="form-select" th:field="*{gioiTinh}">
                                    <option value="Nam">Nam</option>
                                    <option value="Nữ">Nữ</option>
                                    <option value="Khác">Khác</option>
                                </select>
                            </div>
                        </div>

                        <div class="row mb-4">
                            <div class="col-md-6 mb-3 mb-md-0">
                                <label class="form-label mb-2">Số CCCD / Định danh</label>
                                <input class="form-control" type="text" th:field="*{cccd}" placeholder="Nhập 12 số CCCD">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label mb-2">Số điện thoại liên hệ</label>
                                <input class="form-control" type="tel" th:field="*{soDienThoai}" placeholder="Ví dụ: 0987654321">
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label mb-2">Địa chỉ Email</label>
                            <input class="form-control" type="email" th:field="*{emailThanhVien}" placeholder="example@sportsleague.com">
                        </div>

                        <div class="mb-4">
                            <label class="form-label mb-2">Thông tin sức khỏe hiện tại</label>
                            <textarea class="form-control" th:field="*{thongTinSucKhoe}" rows="3" placeholder="Ghi chú tình trạng chấn thương, thể lực..."></textarea>
                        </div>

                        <hr class="my-4">

                        <div class="d-flex justify-content-end gap-2">
                            <a th:href="@{/team/detail/{maDoi}(maDoi=*{maDoi})}" class="btn btn-outline-secondary px-4 py-2 fw-semibold">
							    <i class="bi bi-arrow-left me-2"></i>Quay lại
							</a>
                            <button type="submit" class="btn btn-dark px-4 py-2 fw-semibold shadow-sm">
                                <i class="bi bi-check-lg me-2"></i>Lưu thông tin
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div class="container my-5 text-center" th:if="${currentRole != 'ROLE_BTC' && (currentRole != 'ROLE_TD' || session.maDoi != member.maDoi)}">
        <div class="alert alert-danger py-5 shadow-sm rounded">
            <i class="bi bi-shield-slash-fill text-danger fs-1"></i>
            <h3 class="fw-bold mt-3">TỪ CHỐI QUYỀN TRUY CẬP (403)</h3>
            <p class="text-muted">Bạn không có quyền chỉnh sửa nhân sự cho câu lạc bộ này.</p>
        </div>
    </div>
</th:block>
</html>
