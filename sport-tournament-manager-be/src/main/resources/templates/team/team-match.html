<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/admin-layout :: admin-layout(~{::content})}">

<th:block th:fragment="content">
    <div class="container my-5">

        <div class="text-center mb-5">
            <h2 class="fw-bold text-uppercase m-0 page-title">LỊCH THI ĐẤU & KẾT QUẢ ĐỘI BÓNG</h2>
            <p class="text-muted small mt-2 text-uppercase fw-semibold" style="letter-spacing: 1px;"
               th:text="${currentTeam != null ? currentTeam.tenDoi : 'Câu lạc bộ'}">Tên Đội Bóng</p>
        </div>

        <ul class="nav nav-pills justify-content-center mb-5 gap-2" id="matchTabs" role="tablist">
            <li class="nav-item" role="presentation">
                <button class="nav-link active btn-dark fw-semibold px-4 text-uppercase" 
                        id="upcoming-tab" data-bs-toggle="tab" data-bs-target="#upcoming" 
                        type="button" role="tab" aria-controls="upcoming" aria-selected="true">
                    Trận đấu sắp diễn ra
                </button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link btn-outline-dark fw-semibold px-4 text-uppercase" 
                        id="past-tab" data-bs-toggle="tab" data-bs-target="#past" 
                        type="button" role="tab" aria-controls="past" aria-selected="false">
                    Trận đấu đã tham gia
                </button>
            </li>
        </ul>

        <div class="tab-content" id="matchTabsContent">
            
            <div class="tab-pane fade show active" id="upcoming" role="tabpanel" aria-labelledby="upcoming-tab">
                <div th:if="${#lists.isEmpty(upcomingMatches)}" class="text-center my-5 text-muted py-4 bg-white rounded border">
                    <i class="bi bi-calendar-x fs-2 d-block mb-2"></i>
                    Không có trận đấu nào sắp diễn ra.
                </div>
                
                <div th:unless="${#lists.isEmpty(upcomingMatches)}" class="match-list">
                    <div th:each="m : ${upcomingMatches}" class="match-row d-flex align-items-center bg-white p-2 mb-2 border rounded shadow-sm">
                        <div class="match-status-icon text-muted ps-3">
                            <i class="bi bi-calendar3-event fs-5"></i>
                        </div>
                        
                        <div class="match-main-content d-flex align-items-center justify-content-center flex-grow-1 px-4">
                            <div class="team-home text-end fw-bold text-dark" style="width: 35%;" th:text="${m.maDoiA}">Đội chủ nhà</div>
                            
                            <div class="match-score-box d-flex flex-column align-items-center mx-4 bg-light" style="width: 25%;">
                                <span class="fw-bold text-primary text-nowrap" th:text="${m.ngayGioThiDau != null ? #strings.substring(m.ngayGioThiDau, 11, 16) : '19:00'}">19:00</span>
                                <small class="text-muted fw-semibold text-nowrap" style="font-size: 0.7rem;"
                                       th:text="${m.ngayGioThiDau != null ? #strings.substring(m.ngayGioThiDau, 0, 10) : '28/06/2026'}">28/06/2026</small>
                            </div>
                            
                            <div class="team-away text-start fw-bold text-dark" style="width: 35%;" th:text="${m.maDoiB}">Đội khách</div>
                        </div>
                        
                        <div class="match-info-badge pe-3 text-center">
                            <span class="badge bg-light text-dark border px-2 py-1" th:text="'Vòng ' + ${m.vongDau}">Vòng 1</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="tab-pane fade" id="past" role="tabpanel" aria-labelledby="past-tab">
                <div th:if="${#lists.isEmpty(pastMatches)}" class="text-center my-5 text-muted py-4 bg-white rounded border">
                    <i class="bi bi-card-list fs-2 d-block mb-2"></i>
                    Chưa có dữ liệu trận đấu đã tham gia.
                </div>
                
                <div th:unless="${#lists.isEmpty(pastMatches)}" class="match-list">
                    <div th:each="m : ${pastMatches}" class="match-row d-flex align-items-center bg-white p-2 mb-2 border rounded shadow-sm" 
                         th:classappend="${m.trangThaiTran == 'PLAYING'} ? 'live-match border-danger bg-danger-subtle' : ''">
                        
                        <div class="match-status-icon ps-3" th:classappend="${m.trangThaiTran == 'PLAYING'} ? 'text-danger' : 'text-muted'">
                            <i th:class="${m.trangThaiTran == 'PLAYING'} ? 'bi bi-activity fs-5 animate-pulse' : 'bi bi-check-circle-fill text-success fs-5'"></i>
                        </div>
                        
                        <div class="match-main-content d-flex align-items-center justify-content-center flex-grow-1 px-4">
                            <div class="team-home text-end fw-bold text-dark" style="width: 35%;" th:text="${m.maDoiA}">Wolfsburg</div>
                            
                            <div class="match-score-box d-flex align-items-center mx-4" style="width: 25%;">
                                <span class="score-num fw-bold fs-4" th:classappend="${m.trangThaiTran == 'PLAYING'} ? 'text-danger' : ''" th:text="${m.tySoDoiA}">0</span>
                                <span class="score-divider mx-2 fw-bold text-muted">:</span>
                                <span class="score-num fw-bold fs-4" th:classappend="${m.trangThaiTran == 'PLAYING'} ? 'text-danger' : ''" th:text="${m.tySoDoiB}">0</span>
                            </div>
                            
                            <div class="team-away text-start fw-bold text-dark" style="width: 35%;" th:text="${m.maDoiB}">Paderborn</div>
                        </div>
                        
                        <div class="match-info-badge pe-3">
                            <span th:if="${m.trangThaiTran == 'PLAYING'}" class="badge bg-danger text-white py-1 px-2 animate-pulse">LIVE</span>
                            <span th:if="${m.trangThaiTran == 'FINISHED'}" class="badge bg-secondary-subtle text-secondary border border-secondary-subtle py-1 px-2">FT</span>
                        </div>
                    </div>
                </div>
            </div>
            
        </div>

        <div class="d-flex justify-content-end mt-5">
            <a href="/team/list" class="btn btn-outline-secondary px-4 py-2 fw-semibold">
                <i class="bi bi-arrow-left me-2"></i>Quay lại danh sách đội
            </a>
        </div>

    </div>
    
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            var triggerTabList = [].slice.call(document.querySelectorAll('#matchTabs button'))
            triggerTabList.forEach(function (triggerEl) {
                triggerEl.addEventListener('click', function (event) {
                    triggerTabList.forEach(btn => {
                        btn.classList.remove('btn-dark', 'active');
                        btn.classList.add('btn-outline-dark');
                    });
                    this.classList.remove('btn-outline-dark');
                    this.classList.add('btn-dark', 'active');
                });
            });
        });
    </script>
</th:block>
</html>
