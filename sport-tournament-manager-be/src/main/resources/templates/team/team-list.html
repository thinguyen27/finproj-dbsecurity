<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	th:replace="~{layout/admin-layout :: admin-layout(~{::content})}">

<th:block th:fragment="content">
	<div class="container my-5">

		<div class="text-center mb-4">
			<h2 class="fw-bold text-uppercase m-0 page-title">DANH SÁCH ĐỘI THI ĐẤU</h2>
		</div>

		<div class="table-responsive">
			<table class="table table-bundesliga align-middle">
				<thead>
					<tr>
						<th style="width: 10%;">Mã đội</th>
						<th style="width: 25%;">Tên đội</th>
						<th style="width: 20%;">Sân nhà</th>
						<th style="width: 20%;">Trưởng đoàn</th>
						<th class="text-end text-nowrap" style="padding-right: 24px;">Thao tác</th>
					</tr>
				</thead>

				<tbody>
					<tr th:each="team : ${teams}">

						<td class="text-muted" th:text="${team.maDoi}">1</td>


						<td>
							<a th:href="@{/team/match(maDoi=${team.maDoi})}"
							   class="fw-bold text-dark text-decoration-none" 
							   title="Xem danh sách trận đấu đã tham gia"> 
								<span th:text="${team.tenDoi}">Schalke 04</span> <i class="bi bi-calendar3-event small ms-1 text-muted"></i>
							</a>
						</td>

						<td class="text-secondary" th:text="${team.sanNha}">Veltins Arena</td>

						<td class="text-secondary" th:text="${team.truongDoan_Username ?: 'Chưa phân công'}">Thomas Reis</td>

						<td class="text-end text-nowrap" style="padding-right: 24px;">
							<div class="btn-group gap-1">

								<a class="btn btn-outline-primary btn-sm rounded"
									th:href="@{/team/detail/{maDoi}(maDoi=${team.maDoi})}"> 
									Chi tiết 
								</a> 

								<a th:if="${currentRole == 'ROLE_BTC' || (currentRole == 'ROLE_TD' && session.maDoi == team.maDoi)}"
								   class="btn btn-outline-warning btn-sm rounded"
								   th:href="@{/team/edit/{maDoi}(maDoi=${team.maDoi})}"> 
									Sửa 
								</a>

								<a th:if="${currentRole == 'ROLE_BTC'}"
								   class="btn btn-outline-danger btn-sm rounded"
								   th:href="@{/team/delete/{maDoi}(maDoi=${team.maDoi})}"
								   onclick="return confirm('Bạn có chắc chắn muốn xóa đội thi đấu này?')"> 
									Xóa
								</a>

							</div>
						</td>

					</tr>
					
					<tr th:if="${teams == null || teams.isEmpty()}">
						<td colspan="6" class="text-center py-4 text-muted fw-semibold">
							Chưa có đội bóng nào được thiết lập trong hệ thống giải.
						</td>
					</tr>
				</tbody>
			</table>
		</div>

		<div th:if="${currentRole == 'ROLE_BTC'}" class="d-flex justify-content-end mt-4">
			<a class="btn btn-dark px-4 py-2 fw-semibold shadow-sm" th:href="@{/team/add}"> 
				<i class="bi bi-plus-lg me-2"></i> Thêm đội thi đấu
			</a>
		</div>

	</div>
</th:block>
</html>
