<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/admin-layout :: admin-layout(~{::content})}">

<th:block th:fragment="content">
    <div style="background:#f3f3f3; padding:50px 0; min-height:80vh;" class="d-flex align-items-center">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-5">

                    <div class="text-center mb-4">
                        <h2 class="fw-bold text-uppercase m-0 page-title">
                            KHÔI PHỤC MẬT KHẨU
                        </h2>
                        <p class="text-secondary small mt-2">
                            Nhập email liên kết với tài khoản giải đấu để nhận mã xác minh.
                        </p>
                    </div>

                    <div class="card shadow border-0 form-card bg-white">
                        <div class="card-body p-5">

                            <div id="statusMessage" class="alert d-none small py-2"></div>

                            <form id="forgotPasswordForm">
                                
                                <div class="mb-4">
                                    <label class="form-label mb-2 fw-semibold">Địa chỉ Email đã đăng ký</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-light text-muted border-end-0"><i class="bi bi-envelope-fill"></i></span>
                                        <input id="email" class="form-control form-control-lg border-start-0" 
                                               type="email" 
                                               name="email" 
                                               placeholder="example@sportsleague.com" 
                                               required>
                                    </div>
                                </div>

                                <button type="submit" class="btn btn-dark w-100 py-2.5 fw-semibold mb-3 shadow-sm" id="btnSubmit">
                                    <i class="bi bi-send-fill me-2"></i>GỬI MÃ XÁC MINH
                                </button>

                            </form>

                            <hr class="my-4">

                            <div class="text-center">
                                <a th:href="@{/login}" class="text-secondary text-decoration-none small fw-semibold">
                                    <i class="bi bi-arrow-left me-1"></i> Quay lại trang đăng nhập
                                </a>
                            </div>

                        </div>
                    </div>

                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById("forgotPasswordForm").addEventListener("submit", function(e) {
            e.preventDefault(); // Ngăn trình duyệt reload
            
            const email = document.getElementById("email").value;
            const statusDiv = document.getElementById("statusMessage");
            const btnSubmit = document.getElementById("btnSubmit");

            // Trạng thái đang tải
            btnSubmit.innerHTML = `<span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>ĐANG GỬI...`;
            btnSubmit.disabled = true;
            statusDiv.classList.add("d-none"); // Ẩn thông báo cũ

            // Gọi API Backend (Bạn cần có API này trong AuthController)
            fetch('/api/v1/auth/forgot-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: email })
            })
            .then(res => {
                if (!res.ok) throw new Error("Email không tồn tại hoặc hệ thống đang lỗi.");
                return res.json();
            })
            .then(data => {
                // Hiển thị thông báo thành công màu xanh
                statusDiv.className = "alert alert-success small py-2";
                statusDiv.innerHTML = `<i class="bi bi-check-circle-fill me-2"></i> Đã gửi mã xác minh hoặc mật khẩu mới vào email của bạn!`;
            })
            .catch(err => {
                // Hiển thị thông báo lỗi màu đỏ
                statusDiv.className = "alert alert-danger small py-2";
                statusDiv.innerHTML = `<i class="bi bi-exclamation-triangle-fill me-2"></i> ${err.message}`;
            })
            .finally(() => {
                // Khôi phục lại nút bấm
                btnSubmit.innerHTML = `<i class="bi bi-send-fill me-2"></i>GỬI MÃ XÁC MINH`;
                btnSubmit.disabled = false;
            });
        });
    </script>
</th:block>
</html>
